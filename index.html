<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Word Finder</title>
<style>
  :root { 
    --color-background-primary: #ffffff; 
    --color-background-secondary: #f4f4f5;
    --color-text-primary: #09090b; 
    --color-text-secondary: #52525b;
    --color-text-tertiary: #a1a1aa; 
    --color-border-secondary: #e4e4e7;
    --color-success: #22c55e;
    --color-warning: #f59e0b;
    --color-purple: #8b5cf6;
  }

  [data-theme="dark"] {
    --color-background-primary: #09090b;
    --color-background-secondary: #18181b;
    --color-text-primary: #fafafa;
    --color-text-secondary: #a1a1aa;
    --color-border-secondary: #27272a;
  }

  body { 
    font-family: system-ui, -apple-system, sans-serif; 
    background: var(--color-background-primary); 
    color: var(--color-text-primary); 
    padding: 2rem; 
    max-width: 960px; 
    margin: 0 auto; 
    transition: background 0.2s, color 0.2s;
  }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .config-bar { display: flex; gap: 12px; align-items: center; font-size: 14px; font-weight: 500; }
  .config-group { display: flex; align-items: center; gap: 6px; }
  
  input[type="number"] { width: 54px; padding: 4px 8px; border: 1px solid var(--color-border-secondary); border-radius: 6px; background: var(--color-background-primary); color: var(--color-text-primary); font-weight: 600; text-align: center;}
  input[type="text"] { font-size: 22px; font-weight: 600; letter-spacing: 0.05em; padding: 12px 16px; width: 100%; box-sizing: border-box; border: 2px solid var(--color-border-secondary); border-radius: 8px; text-transform: uppercase; background: var(--color-background-primary); color: var(--color-text-primary); outline: none; transition: border-color 0.2s;}
  input[type="text"]:focus { border-color: var(--color-purple); }

  button.btn { background: var(--color-background-secondary); border: 1px solid var(--color-border-secondary); color: var(--color-text-primary); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; }
  button.btn:hover { border-color: var(--color-text-tertiary); }

  .easiest-banner { background: #f0fdf4; border: 1px solid #bbf7d0; border-left: 4px solid var(--color-success); padding: 12px 16px; border-radius: 8px; margin: 20px 0; display: flex; align-items: center; justify-content: space-between; }
  [data-theme="dark"] .easiest-banner { background: #052e16; border-color: #14532d; }

  .results-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-top: 10px; }
  .col-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding-bottom: 8px; border-bottom: 2px solid var(--color-border-secondary); margin-bottom: 12px; display: flex; justify-content: space-between;}
  
  .rrow { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--color-border-secondary); font-size: 15px; }
  .rrow:last-child { border-bottom: none; }
  .word-text { font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
  
  .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-len { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  
  mark { background: #fde047; color: #854d0e; font-weight: bold; border-radius: 2px; padding: 0 1px; }
  [data-theme="dark"] mark { background: #ca8a04; color: #ffffff; }

  @media(max-width: 768px) { .results-layout { grid-template-columns: 1fr; gap: 32px; } }
</style>
</head>
<body>

<div class="top-bar">
  <div class="config-bar">
    <div class="config-group"><label>Long:</label><input type="number" id="longCount" value="20" onchange="triggerSearch()"></div>
    <div class="config-group"><label>Short:</label><input type="number" id="shortCount" value="10" onchange="triggerSearch()"></div>
    <div class="config-group"><label>Weird:</label><input type="number" id="weirdCount" value="5" onchange="triggerSearch()"></div>
  </div>
  <div>
    <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>
</div>

<input type="text" id="qinput" maxlength="20" placeholder="Type letters, '-' or apostrophe..." oninput="debounceSearch(this.value)" autofocus>

<div id="result-box" style="margin-top: 2rem; text-align: center; color: var(--color-text-tertiary);">
  Load a dictionary or start typing to search...
</div>

<script>
let fileStore = [];

// Theme Handler
if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
function toggleTheme() {
  if (document.documentElement.hasAttribute('data-theme')) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', 'dark');
  }
}

// Scoring Data
const keyboardMap = {
  'Q':{r:1, h:'L'}, 'W':{r:1, h:'L'}, 'E':{r:1, h:'L'}, 'R':{r:1, h:'L'}, 'T':{r:1, h:'L'},
  'Y':{r:1, h:'R'}, 'U':{r:1, h:'R'}, 'I':{r:1, h:'R'}, 'O':{r:1, h:'R'}, 'P':{r:1, h:'R'},
  'A':{r:0, h:'L'}, 'S':{r:0, h:'L'}, 'D':{r:0, h:'L'}, 'F':{r:0, h:'L'}, 'G':{r:0, h:'L'},
  'H':{r:0, h:'R'}, 'J':{r:0, h:'R'}, 'K':{r:0, h:'R'}, 'L':{r:0, h:'R'},
  'Z':{r:2, h:'L'}, 'X':{r:2, h:'L'}, 'C':{r:2, h:'L'}, 'V':{r:2, h:'L'}, 'B':{r:2, h:'L'},
  'N':{r:2, h:'R'}, 'M':{r:2, h:'R'}, '-':{r:1, h:'R'}, "'":{r:1, h:'R'}
};

const weirdLetterPts = { 'Z':10, 'Q':10, 'X':9, 'J':8, 'K':6, 'V':5, 'W':4, 'Y':4, 'B':3, 'F':3, 'P':2, 'H':2 };

function getTypingScore(word) {
  let score = 0; let prevHand = null;
  for (let char of word) {
    let key = keyboardMap[char.toUpperCase()];
    if (!key) { score += 4; continue; }
    score += (key.r === 0 ? 1 : (key.r === 1 ? 1.5 : 2.5));
    if (prevHand && key.h === prevHand) score += 1.2;
    prevHand = key.h;
  }
  return score / word.length;
}

function getWeirdnessScore(word) {
  let pts = 0;
  for (let char of word) { pts += (weirdLetterPts[char.toUpperCase()] || 0); }
  const len = word.length;
  let multiplier = 0.5;
  if (len === 3) multiplier = 0.8;
  else if (len === 4) multiplier = 1.1;
  else if (len === 5) multiplier = 1.2; 
  else if (len === 6) multiplier = 1.1;
  else if (len === 7) multiplier = 0.9;
  else if (len === 8) multiplier = 0.7;
  return pts * multiplier;
}

// OPTIMIZATION: Pre-calculate all word metrics on load
function parseWords(text) { 
  const uniqueStrings = [...new Set(text.split('\n').map(w => w.trim().toUpperCase()).filter(Boolean))]; 
  return uniqueStrings.map(w => ({
    w: w,
    len: w.length,
    wScore: getWeirdnessScore(w),
    tScore: getTypingScore(w)
  }));
}

// OPTIMIZATION: Debounce search input
let searchTimeout;
function debounceSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => handleQ(val), 200);
}

function triggerSearch() {
  handleQ(document.getElementById('qinput').value);
}

function hl(word, q) {
  if (!q) return word;
  return word.split(q).join(`<mark>${q}</mark>`);
}

function renderColumn(items, q) {
  if (!items.length) return `<div class="rrow"><span class="word-text" style="color:var(--color-text-tertiary)">None</span></div>`;
  return items.map(item => `
    <div class="rrow">
      <span class="word-text">${hl(item.w, q)}</span>
      <span class="badge badge-len">${item.len}</span>
    </div>
  `).join('');
}

function handleQ(val) {
  const q = val.trim().toUpperCase();
  const box = document.getElementById('result-box');
  const limitLong = Math.max(1, parseInt(document.getElementById('longCount').value) || 20);
  const limitShort = Math.max(1, parseInt(document.getElementById('shortCount').value) || 10);
  const limitWeird = Math.max(1, parseInt(document.getElementById('weirdCount').value) || 5);

  if (!q) { box.innerHTML = "Start typing to search..."; return; }
  if (!/^[A-Z-']{1,20}$/.test(q)) { box.innerHTML = `<span style="color:var(--color-warning)">⚠️ Invalid symbol detected</span>`; return; }

  const allWords = fileStore.length > 0 ? fileStore[0].words : [];
  
  // Fast filter
  const matches = allWords.filter(item => item.w.includes(q));

  if (!matches.length) { box.innerHTML = "No matching words found."; return; }

  // Sorting is now just comparing pre-calculated numbers (Lightning Fast)
  const sortedLong = [...matches].sort((a,b) => b.len - a.len).slice(0, limitLong);
  const sortedShort = [...matches].sort((a,b) => a.len - b.len).slice(0, limitShort);
  const sortedWeird = [...matches].sort((a,b) => b.wScore - a.wScore).slice(0, limitWeird);

  let easiestItem = matches[0];
  for(let i = 1; i < matches.length; i++) {
      if(matches[i].tScore < easiestItem.tScore) easiestItem = matches[i];
  }

  box.innerHTML = `
    <div class="easiest-banner">
      <div style="text-align: left;">
        <div style="font-size:11px; font-weight:700; text-transform:uppercase; color:var(--color-success)">⚡ Easiest to type fast</div>
        <div style="font-size:20px; font-weight:800; letter-spacing:0.05em; margin-top:2px;">${hl(easiestItem.w, q)}</div>
      </div>
      <span class="badge" style="background:var(--color-success); color:white; font-size:13px; padding:4px 8px;">Len ${easiestItem.len}</span>
    </div>

    <div class="results-layout">
      <div>
        <div class="col-header"><span style="color:var(--color-purple)">Longest</span> <span>Top ${sortedLong.length}</span></div>
        ${renderColumn(sortedLong, q)}
      </div>
      
      <div>
        <div class="col-header"><span style="color:var(--color-success)">Shortest</span> <span>Top ${sortedShort.length}</span></div>
        ${renderColumn(sortedShort, q)}
      </div>

      <div>
        <div class="col-header"><span style="color:var(--color-warning)">Weirdest</span> <span>Top ${sortedWeird.length}</span></div>
        ${renderColumn(sortedWeird, q)}
      </div>
    </div>
  `;
}

// Auto-load words.txt on boot
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('result-box').innerHTML = `⏳ Building performance index...`;
  fetch('words.txt')
    .then(res => res.text())
    .then(text => {
      fileStore = [{ name: 'words.txt', words: parseWords(text) }];
      document.getElementById('result-box').innerHTML = `Start typing to search...`;
      if(document.getElementById('qinput').value) triggerSearch();
    })
    .catch(() => {
      document.getElementById('result-box').innerHTML = `⚠️ Could not auto-load <b>words.txt</b>. Check local server.`;
    });
});
</script>
</body>
</html>
