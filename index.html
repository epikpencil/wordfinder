<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Word Finder</title>
<style>
  :root { 
    --color-background-primary: #ffffff; --color-background-secondary: #f4f4f5;
    --color-text-primary: #09090b; --color-text-secondary: #52525b;
    --color-text-tertiary: #a1a1aa; --color-border-secondary: #e4e4e7;
    --color-success: #22c55e;
  }
  body { font-family: system-ui; background: var(--color-background-primary); color: var(--color-text-primary); padding: 2rem; max-width: 900px; margin: 0 auto; }
  .config-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
  input[type="text"] { font-size: 20px; padding: 10px; width: 100%; border: 2px solid var(--color-border-secondary); border-radius: 6px; text-transform: uppercase; }
  .results-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px; }
  .rrow { display: flex; gap: 10px; padding: 5px 0; border-bottom: 1px solid #eee; font-family: monospace; }
  .badge-g { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
</style>
</head>
<body>

<div class="config-bar">
  <input type="number" id="longCount" value="20" style="width:60px" placeholder="Long">
  <input type="number" id="shortCount" value="10" style="width:60px" placeholder="Short">
  <button onclick="handleQ(document.getElementById('qinput').value)">Apply Settings</button>
</div>

<input type="text" id="qinput" maxlength="20" placeholder="e.g. EN-' or E-S" oninput="handleQ(this.value)">

<div id="result-box"></div>

<script>
let fileStore = [];
let idx = {};

// Added apostrophe to keyboard map for typing score
const keyboardMap = {
  'Q':{r:1, h:'L'}, 'W':{r:1, h:'L'}, 'E':{r:1, h:'L'}, 'R':{r:1, h:'L'}, 'T':{r:1, h:'L'},
  'Y':{r:1, h:'R'}, 'U':{r:1, h:'R'}, 'I':{r:1, h:'R'}, 'O':{r:1, h:'R'}, 'P':{r:1, h:'R'},
  'A':{r:0, h:'L'}, 'S':{r:0, h:'L'}, 'D':{r:0, h:'L'}, 'F':{r:0, h:'L'}, 'G':{r:0, h:'L'},
  'H':{r:0, h:'R'}, 'J':{r:0, h:'R'}, 'K':{r:0, h:'R'}, 'L':{r:0, h:'R'},
  'Z':{r:2, h:'L'}, 'X':{r:2, h:'L'}, 'C':{r:2, h:'L'}, 'V':{r:2, h:'L'}, 'B':{r:2, h:'L'},
  'N':{r:2, h:'R'}, 'M':{r:2, h:'R'}, '-':{r:1, h:'R'}, "'":{r:1, h:'R'}
};

function getTypingScore(word) {
  let score = 0; let prevHand = null;
  for (let char of word) {
    let key = keyboardMap[char.toUpperCase()];
    if (!key) { score += 5; continue; }
    score += (key.r === 0 ? 1 : (key.r === 1 ? 1.5 : 2.5));
    if (prevHand && key.h === prevHand) score += 1.2;
    prevHand = key.h;
  }
  return score / word.length;
}

function handleQ(val) {
  const q = val.trim().toUpperCase();
  const box = document.getElementById('result-box');
  const longLimit = parseInt(document.getElementById('longCount').value) || 20;
  const shortLimit = parseInt(document.getElementById('shortCount').value) || 10;

  if (!q) return;
  if (!/^[A-Z-']{1,20}$/.test(q)) { box.innerHTML = "Invalid characters."; return; }

  let matches = [];
  // Branching Logic: Use Index for fast small lookups, Filter for long lookups
  if (q.length <= 5) {
    matches = idx[q] ? [...new Set([...idx[q].long, ...idx[q].short])] : [];
  } else {
    matches = [...new Set(fileStore.flatMap(f => f.words))].filter(w => w.includes(q));
  }

  const sortedLong = [...matches].sort((a,b) => b.length - a.length).slice(0, longLimit);
  const sortedShort = [...matches].sort((a,b) => a.length - b.length).slice(0, shortLimit);
  
  // Find Easiest (Must be in the result set)
  let bestWord = matches.reduce((best, curr) => getTypingScore(curr) < getTypingScore(best) ? curr : best, matches[0]);

  box.innerHTML = `
    <h3>Easiest: ${bestWord}</h3>
    <div class="results-layout">
      <div><h4>Longest</h4>${sortedLong.map(w => `<div class="rrow">${w} <span class="badge-g">${w.length}</span></div>`).join('')}</div>
      <div><h4>Shortest</h4>${sortedShort.map(w => `<div class="rrow">${w} <span class="badge-g">${w.length}</span></div>`).join('')}</div>
    </div>
  `;
}

// ... (Keep existing loadFiles and buildIndex logic, ensuring parseWords handles apostrophes)
function parseWords(text) { return [...new Set(text.split('\n').map(w => w.trim().toUpperCase()).filter(Boolean))]; }
</script>
</body>
</html>
